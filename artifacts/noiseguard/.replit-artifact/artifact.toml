kind = "web"
previewPath = "/"
title = "NoiseGuard – AI Noise Suppressor"
version = "1.0.0"
id = "artifacts/noiseguard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20728

[services.development]
run = "pnpm --filter @workspace/noiseguard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/noiseguard", "run", "build" ]
serve = "static"
publicDir = "artifacts/noiseguard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20728"
BASE_PATH = "/"
